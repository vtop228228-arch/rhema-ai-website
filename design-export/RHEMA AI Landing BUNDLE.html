document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

; padding: 0; }\n    html, body { background: #090909; }\n    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }\n    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }\n    @keyframes spin { to{transform:rotate(360deg)} }\n    @keyframes shimmer { 0%,100%{opacity:0.2} 50%{opacity:1} }\n    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }\n    @keyframes ctaGlow { 0%,100%{box-shadow:0 0 0 0 rgba(255,106,0,0)} 50%{box-shadow:0 0 28px 8px rgba(255,106,0,0.2)} }\n    input::placeholder, textarea::placeholder { color: #888; font-family: 'Inter', sans-serif; font-size: 13px; }\n    input:focus, textarea:focus { outline: none; }\n    button { cursor: pointer; }\n    a { text-decoration: none; }\n    ::-webkit-scrollbar { width: 3px; }\n    ::-webkit-scrollbar-thumb { background: #1E1E1E; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #090909; color: #F0EEE8; font-family: 'Inter', system-ui, sans-serif;\">\n\n  <!-- ══ NAV ══ -->\n  <nav style=\"background: rgba(9,9,9,0.97); border-bottom: 1px solid #0F0F0F; height: 54px; padding: 0 72px; display: flex; align-items: center; gap: 36px; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(10px);\">\n    <img src=\"bc69668f-3969-455b-8a6e-234d165305eb\" height=\"50\" style=\"display:block;flex-shrink:0;width:auto;\" alt=\"RHEMA AI\">\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <a href=\"#\" style=\"font-size: 11px; color: #999; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;\" style-hover=\"color:#F0EEE8\">Как работаем<\u002Fa>\n    <a href=\"#\" style=\"font-size: 11px; color: #999; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;\" style-hover=\"color:#F0EEE8\">О нас<\u002Fa>\n    <a href=\"#contact\" style=\"font-size: 11px; color: #999; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;\" style-hover=\"color:#F0EEE8\">Контакты<\u002Fa>\n    <button onclick=\"{{ startChat }}\" style=\"background: #FF6A00; color: #090909; border: none; padding: 8px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; transition: opacity 0.15s;\" style-hover=\"opacity: 0.82;\">ДИАГНОСТИКА<\u002Fbutton>\n  <\u002Fnav>\n\n  <!-- ══ HERO ══ -->\n  <div style=\"display: flex; min-height: 640px;\">\n\n    <!-- LEFT: МОНОЛИТ -->\n    <div style=\"flex: 1; min-width: 0; background: #090909; padding: 60px 40px 60px 72px; display: flex; flex-direction: column; justify-content: center; gap: 24px; overflow: hidden; position: relative;\">\n      <!-- Grid texture -->\n      <div style=\"position: absolute; inset: 0; background-image: linear-gradient(rgba(255,106,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,106,0,0.04) 1px, transparent 1px); background-size: 42px 42px; pointer-events: none;\"><\u002Fdiv>\n      <!-- Depth vignette -->\n      <div style=\"position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 55%, transparent 40%, #090909 82%); pointer-events: none;\"><\u002Fdiv>\n      <!-- Eyebrow -->\n      <div style=\"display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; animation: fadeUp 0.5s ease 0.05s both;\">\n        <div style=\"width: 36px; height: 1px; background: #FF6A00;\"><\u002Fdiv>\n        <span style=\"font-size: 10px; color: #FF6A00; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;\">AI-диагностика бизнеса<\u002Fspan>\n      <\u002Fdiv>\n      <!-- H1 with stagger -->\n      <h1 style=\"font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 4.4vw, 76px); line-height: 0.87; position: relative; z-index: 1;\">\n        <span style=\"display: block; color: #F0EEE8; animation: fadeUp 0.6s ease 0.18s both;\">ОТ ДИАГНОСТИКИ<\u002Fspan>\n        <span style=\"display: block; color: #FF6A00; animation: fadeUp 0.6s ease 0.3s both;\">ДО МАСШТАБИРОВАНИЯ<\u002Fspan>\n        <span style=\"display: block; color: #666666; font-size: 0.43em; letter-spacing: 5px; margin-top: 10px; animation: fadeUp 0.6s ease 0.4s both;\">ЗА 2 МИНУТЫ — БЕСПЛАТНО<\u002Fspan>\n      <\u002Fh1>\n      <!-- Body -->\n      <p style=\"font-size: 14px; color: 555; max-width: 400px; line-height: 1.85; position: relative; z-index: 1; animation: fadeUp 0.6s ease 0.45s both; text-wrap: pretty\">Задайте 2–3 вопроса о своём бизнесе прямо здесь. AI покажет персональную карту потерь в ₽ и порекомендует, что внедрить.<\u002Fp>\n      <!-- Stats -->\n      \n    <\u002Fdiv>\n    <!-- DIVIDER -->\n    <div style=\"width: 1px; background: #141414; flex-shrink: 0;\"><\u002Fdiv>\n\n    <!-- RIGHT: chat widget (always dark) -->\n    <div style=\"flex: 0 0 460px; background: #0C0C0C; display: flex; flex-direction: column; min-height: 640px;\">\n\n      <!-- Chat header -->\n      <div style=\"padding: 18px 24px; border-bottom: 1px solid #161616; display: flex; align-items: center; gap: 9px; flex-shrink: 0;\">\n        <div style=\"width: 6px; height: 6px; background: #FF6A00;\"><\u002Fdiv>\n        <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px; color: #FF6A00;\">ДИАГНОСТИКА БИЗНЕСА<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- IDLE -->\n      <sc-if value=\"{{ isIdle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex: 1; padding: 30px 24px; display: flex; flex-direction: column; gap: 18px; justify-content: center;\">\n          <h2 style=\"font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: #F0EEE8; line-height: 1.05;\">Узнайте за 2 минуты,<br>где теряете деньги<\u002Fh2>\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <div style=\"display: flex; gap: 9px; align-items: center;\"><div style=\"width: 3px; height: 3px; background: #FF6A00; flex-shrink: 0;\"><\u002Fdiv><span style=\"font-size: 13px; color: #999;\">2–3 вопроса, ~2 минуты<\u002Fspan><\u002Fdiv>\n            <div style ex-shrink: 0; width: 36px;\">04<\u002Fdiv>\n          <div>\n            <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #090909; letter-spacing: 1px; margin-bottom: 5px;\">СОПРОВОЖДЕНИЕ<\u002Fdiv>\n            <div style=\"font-size: 13px; color: rgba(0,0,0,0.5); line-height: 1.6;\">Мониторинг, обновления и масштабирование — пока агенты растут вместе с бизнесом<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ FAQ ══ -->\n  <div style=\"border-top: 1px solid #0F0F0F; padding: 68px 72px; background: #090909;\">\n    <div style=\"display: flex; align-items: center; gap: 13px; margin-bottom: 48px;\">\n      <div style=\"width: 4px; height: 4px; background: #FF6A00;\"><\u002Fdiv>\n      <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 2px; color: #F0EEE8;\">ЧАСТЫЕ ВОПРОСЫ<\u002Fspan>\n      <div style=\"flex: 1; height: 1px; background: #0F0F0F;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: start;\">\n      <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n        <sc-for list=\"{{ faqItems }}\" as=\"faq\" hint-placeholder-count=\"6\">\n          <div style=\"background: #0C0C0C; cursor: pointer;\" onclick=\"{{ faq.toggle }}\">\n            <div style=\"padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; gap: 16px;\">\n              <span style=\"font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; color: {{ faq.qColor }}; line-height: 1.2; flex: 1; transition: color 0.2s;\">{{ faq.q }}<\u002Fspan>\n              <div style=\"width: 24px; height: 24px; border: 1px solid {{ faq.borderColor }}; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.2s;\">\n                <span style=\"color: {{ faq.iconColor }}; font-size: 17px; line-height: 1; font-weight: 300; user-select: none; display: block;\">{{ faq.icon }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ faq.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding: 0 22px 20px 22px; border-top: 1px solid #141414; animation: fadeUp 0.18s ease;\">\n                <p style=\"font-size: 14px; color: #AAAAAA; line-height: 1.85; padding-top: 15px; text-wrap: pretty;\">{{ faq.a }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 22px; padding-top: 6px; position: sticky; top: 72px;\">\n        <div style=\"display: flex; align-items: center; gap: 10px;\">\n          <div style=\"width: 36px; height: 1px; background: #FF6A00;\"><\u002Fdiv>\n          <span style=\"font-size: 10px; color: #FF6A00; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;\">Не нашли ответ?<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #F0EEE8; line-height: 1.0; letter-spacing: 1px;\">СПРОСИТЕ<br><span style=\"color: #FF6A00;\">НАПРЯМУЮ<\u002Fspan><\u002Fp>\n        <p style=\"font-size: 14px; color: #AAAAAA; line-height: 1.75; max-width: 280px; text-wrap: pretty;\">Ответим в течение рабочего дня — в Telegram или по телефону.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <a href=\"#contact\" style=\"background: #FF6A00; color: #090909; padding: 12px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; text-decoration: none; display: inline-block; width: fit-content;\">НАПИСАТЬ НАМ →<\u002Fa>\n          <span style=\"font-size: 10px; color: #666;\">Бесплатно · без обязательств<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"border-top: 1px solid #141414; padding-top: 20px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"display: flex; gap: 9px; align-items: center;\"><div style=\"width: 3px; height: 3px; background: #FF6A00; flex-shrink: 0;\"><\u002Fdiv><span style=\"font-size: 12px; color: #888;\">10 клиентов уже работают с нами<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 9px; align-items: center;\"><div style=\"width: 3px; height: 3px; background: #FF6A00; flex-shrink: 0;\"><\u002Fdiv><span style=\"font-size: 12px; color: #888;\">Средний ROI — 1–2 месяца<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 9px; align-items: center;\"><div style=\"width: 3px; height: 3px; background: #FF6A00; flex-shrink: 0;\"><\u002Fdiv><span style=\"font-size: 12px; color: #888;\">Бесплатная диагностика за 2 минуты<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ CONTACT ══ -->\n  <div id=\"contact\" style=\"padding: 68px 72px; display: grid; grid-template-columns: 1fr 440px; gap: 68px;\">\n    <div style=\"display: flex; flex-direction: column; gap: 18px;\">\n      <div style=\"display: flex; align-items: center; gap: 8px;\">\n        <div style=\"width: 4px; height: 4px; background: #FF6A00;\"><\u002Fdiv>\n        <span style=\"font-size: 10px; color: #FF6A00; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;\">Прямая связь<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 3.4vw, 62px); line-height: 0.9; letter-spacing: -0.5px;\">\n        <span style=\"display: block; color: #F0EEE8;\">ОСТАВЬТЕ<\u002Fspan>\n        <span style=\"display: block; color: #FF6A00;\">ЗАЯВКУ<\u002Fspan>\n      <\u002Fh2>\n      <p style=\"font-size: 13px; color: #888; line-height: 1.8; max-width: 340px;\">Не хотите проходить диагностику — просто напишите. Свяжемся и разберём всё лично.<\u002Fp>\n      <div style=\"display: flex; flex-direction: column; gap: 9px; margin-top: 10px; padding-top: 18px; border-top: 1px solid #0F0F0F;\">\n        <div style=\"display: flex; gap: 9px; align-items: center;\"><div style=\"width: 3px; height: 3px; background: #FF6A00; flex-shrink: 0;\"><\u002Fdiv><span style=\"font-size: 12px; color: #505050;\">Отвечаем в течение рабочего дня<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 9px; align-items: center;\"><div style=\"width: 3px; height: 3px; background: #FF6A00; flex-shrink: 0;\"><\u002Fdiv><span style=\"font-size: 12px; color: #505050;\">Первая консультация — бесплатно<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background: #0C0C0C; padding: 32px 28px; display: flex; flex-direction: column; gap: 10px;\">\n      <input type=\"text\" placeholder=\"Ваше имя\" style=\"background: #131313; border: 1px solid #1C1C1C; color: #F0EEE8; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; width: 100%; transition: border-color 0.18s;\" style-focus=\"border-color: rgba(255,106,0,0.55);\">\n      <input type=\"text\" placeholder=\"Telegram (@username)\" style=\"background: #131313; border: 1px solid #1C1C1C; color: #F0EEE8; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; width: 100%; transition: border-color 0.18s;\" style-focus=\"border-color: rgba(255,106,0,0.55);\">\n      <textarea placeholder=\"Расскажите о вашем бизнесе...\" rows=\"4\" style=\"background: #131313; border: 1px solid #1C1C1C; color: #F0EEE8; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; width: 100%; resize: none; transition: border-color 0.18s;\" style-focus=\"border-color: rgba(255,106,0,0.55);\"><\u002Ftextarea>\n      <button style=\"background: #FF6A00; color: #090909; border: none; padding: 13px 22px; font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 1px; width: 100%;\">ОСТАВИТЬ ЗАЯВКУ<\u002Fbutton>\n      <p style=\"font-size: 10px; color: #383838; text-align: center; line-height: 1.5;\">Нажимая кнопку, вы соглашаетесь на обработку персональных данных<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ FOOTER ══ -->\n  <footer style=\"border-top: 1px solid #0F0F0F; padding: 24px 72px; display: flex; align-items: center; justify-content: space-between;\">\n    <img src=\"bc69668f-3969-455b-8a6e-234d165305eb\" height=\"22\" style=\"display:block;flex-shrink:0;width:auto;\" alt=\"RHEMA AI\">\n    <span style=\"font-size: 10px; color: #3A3A3A;\">© 2026 Rhema AI. Все права защищены.<\u002Fspan>\n    <div style=\"display: flex; gap: 22px;\">\n      <a href=\"#\" style=\"font-size: 10px; color: #777; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;\" style-hover=\"color:#333\">Telegram<\u002Fa>\n      <a href=\"#\" style=\"font-size: 10px; color: #777; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;\" style-hover=\"color:#333\">WhatsApp<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  chatRef = React.createRef();\n  _timer = null;\n\n  AI_MSGS = [\n    'Здравствуйте! Расскажите, чем занимается ваш бизнес и что сейчас больше всего отнимает время или деньги?',\n    'Понял вас. А какой примерный оборот в месяц или сколько у вас клиентов? Это нужно для точной оценки потерь.',\n    'Отличная картина — уже вижу несколько зон. Дайте 15 секунд, составлю персональную карту потерь.',\n  ];\n\n  MAP = {\n    sphere: 'Ваш бизнес',\n    total: '430 000',\n    losses: [\n      { title: 'Ручная обработка заявок и повторяющихся вопросов', fmt: '220 000', note: '≈ 80 часов в месяц на типовые ответы' },\n      { title: 'Лиды уходят без ответа в нерабочее время', fmt: '180 000', note: 'Часть клиентов не ждёт и уходит к конкурентам' },\n      { title: 'Ручное ведение документов и напоминаний', fmt: '30 000', note: '≈ 15 часов менеджерской работы в месяц' },\n    ],\n    agents: [\n      { name: 'AI-ассистент поддержки 24/7', effect: 'Отвечает клиентам за 1 минуту в любое время, снимает до 70% типовых вопросов' },\n      { name: 'Агент квалификации лидов', effect: 'Доводит лид до оплаты без участия менеджера, работает круглосуточно' },\n    ],\n    roi: 'Ориентировочная окупаемость — 1–2 месяца за счёт удержания лидов и экономии 80+ часов рутины.',\n    disclaimer: 'Это предварительная оценка на основе ваших ответов. Точные цифры покажет бесплатная диагностика.',\n  };\n\n  FAQ_ITEMS = [\n    {\n      q: 'СКОЛЬКО СТОИТ ВНЕДРЕНИЕ AI-АГЕНТА?',\n      a: 'Стоимость зависит от задачи и масштаба. Базовые агенты для малого бизнеса — от 60 000 ₽. Комплексные решения — от 150 000 ₽. Точную цифру называем после бесплатной диагностики: без неё любая цена будет пальцем в небо.',\n    },\n    {\n      q: 'СКОЛЬКО ВРЕМЕНИ ЗАНИМАЕТ ЗАПУСК?',\n      a: 'Простые агенты запускаем за 5–7 рабочих дней. Полный цикл с интеграцией в CRM, телефонию и мессенджеры — 2–4 недели. У каждого проекта жёсткий дедлайн — мы не растягиваем сроки.',\n    },\n    {\n      q: 'НУЖЕН ЛИ ТЕХНИЧЕСКИЙ СПЕЦИАЛИСТ НА НАШЕЙ СТОРОНЕ?',\n      a: 'Нет. Мы берём весь технический цикл на себя — от архитектуры до деплоя. Вам нужен только один контакт, который знает бизнес-процессы. Мы сами задаём нужные вопросы и разбираемся в специфике ниши.',\n    },\n    {\n      q: 'КАК ПРОИСХОДИТ ИНТЕГРАЦИЯ С НАШИМИ СИСТЕМАМИ?',\n      a: 'Интегрируемся с AmoCRM, Bitrix24, 1С, любыми CRM через API, WhatsApp, Telegram, телефонией (Mango, Sipuni, UIS) и платёжными системами. Нестандартная система — не проблема: оценим в рамках диагностики.',\n    },\n    {\n      q: 'ЧТО ЕСЛИ AI-АГЕНТ НЕ СПРАВИТСЯ С ЗАПРОСОМ?',\n      a: 'Все агенты проектируются с эскалацией: если бот не уверен в ответе, он корректно передаёт диалог живому сотруднику. Клиент не застревает в петле — это наш стандарт. 3 месяца сопровождения после запуска входят в стоимость.',\n    },\n    {\n      q: 'КАКОЙ ROI МОЖНО ОЖИДАТЬ?',\n      a: 'По нашей статистике — окупаемость за 1–2 месяца. В среднем клиент экономит 60–120 часов рутины и сохраняет 15–30% лидов, которые раньше уходили без ответа. Точный расчёт ROI для вашей ниши покажет бесплатная диагностика.',\n    },\n  ];\n\n  state = {\n    chatState: 'idle',\n    msgs: [],\n    stream: '',\n    isStreaming: false,\n    typing: false,\n    aiTurn: 0,\n    inputVal: '',\n    inputDisabled: false,\n    lName: '',\n    lTg: '',\n    lErr: '',\n    tab: 0,\n    openFaq: -1,\n  };\n\n  componentDidUpdate() {\n    const el = this.chatRef.current;\n    if (el) el.scrollTop = el.scrollHeight;\n  }\n\n  componentWillUnmount() {\n    if (this._timer) clearInterval(this._timer);\n  }\n\n  addMsg(text, isUser) {\n    const msg = isUser\n      ? { text, align: 'flex-end', bg: '#FF6A00', color: '#090909' }\n      : { text, align: 'flex-start', bg: '#181818', color: '#C0BBB2' };\n    this.setState(s => ({ msgs: [...s.msgs, msg] }));\n  }\n\n  streamText(text, onDone) {\n    if (this._timer) clearInterval(this._timer);\n    let i = 0;\n    this.setState({ isStreaming: true, stream: text[0] || '', typing: false, inputDisabled: true });\n    this._timer = setInterval(() => {\n      i++;\n      if (i >= text.length) {\n        clearInterval(this._timer);\n        this._timer = null;\n        this.setState({ isStreaming: false, stream: '' }, () => onDone(text));\n      } else {\n        this.setState({ stream: text.slice(0, i + 1) });\n      }\n    }, 22);\n  }\n\n  setTab = (n) => this.setState({ tab: n });\n\n  componentDidMount() {\n    const counters = document.querySelectorAll('[data-count]');\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (!e.isIntersecting) return;\n        const el = e.target;\n        const target = parseFloat(el.dataset.count);\n        const prefix = el.dataset.prefix || '';\n        const suffix = el.dataset.suffix || '';\n        const dur = 1400;\n        const start = performance.now();\n        const isFloat = el.dataset.float === '1';\n        const step = (now) => {\n          const t = Math.min((now - start) / dur, 1);\n          const ease = 1 - Math.pow(1 - t, 3);\n          const val = target * ease;\n          el.textContent = prefix + (isFloat ? val.toFixed(1) : Math.round(val)) + suffix;\n          if (t < 1) requestAnimationFrame(step);\n        };\n        requestAnimationFrame(step);\n        io.unobserve(el);\n      });\n    }, { threshold: 0.5 });\n    counters.forEach(el => io.observe(el));\n  }\n\n  startChat = () => {\n    if (this.state.chatState !== 'idle') return;\n    this.setState({ chatState: 'active', typing: true, inputDisabled: true, msgs: [], aiTurn: 0 });\n    setTimeout(() => {\n      this.streamText(this.AI_MSGS[0], t => {\n        this.addMsg(t, false);\n        this.setState({ aiTurn: 1, inputDisabled: false });\n      });\n    }, 600);\n  };\n\n  handleInput = (e) => this.setState({ inputVal: e.target.value });\n\n  handleKey = (e) => {\n    if (e.key === 'Enter' && !e.shiftKey) {\n      e.preventDefault();\n      this.sendMsg();\n    }\n  };\n\n  sendMsg = () => {\n    const { inputVal, aiTurn, chatState, inputDisabled } = this.state;\n    if (!inputVal.trim() || chatState !== 'active' || inputDisabled) return;\n    const text = inputVal.trim();\n    this.addMsg(text, true);\n    this.setState({ inputVal: '', typing: true, inputDisabled: true });\n    const turn = aiTurn;\n    setTimeout(() => {\n      if (turn < this.AI_MSGS.length) {\n        this.streamText(this.AI_MSGS[turn], t => {\n          this.addMsg(t, false);\n          if (turn === this.AI_MSGS.length - 1) {\n            this.setState({ chatState: 'map_loading', inputDisabled: true });\n            setTimeout(() => this.setState({ chatState: 'map_shown' }), 2600);\n          } else {\n            this.setState({ aiTurn: turn + 1, inputDisabled: false });\n          }\n        });\n      }\n    }, 900);\n  };\n\n  submitLead = () => {\n    const { lName, lTg } = this.state;\n    if (!lName.trim() || lName.trim().length < 2) {\n      this.setState({ lErr: 'Укажите имя (минимум 2 символа)' });\n      return;\n    }\n    const tg = lTg.replace(/^@/, '');\n    if (!/^[a-zA-Z0-9_]{5,32}$/.test(tg)) {\n      this.setState({ lErr: 'Некорректный Telegram-юзернейм (5–32 символа, только a–z, 0–9, _)' });\n      return;\n    }\n    this.setState({ chatState: 'done', lErr: '' });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const t = s.tab;\n    const OB = '#FF6A00';\n    const DM = 'transparent';\n    return {\n      isTab0: t === 0, isTab1: t === 1, isTab2: t === 2, isTab3: t === 3,\n      tab0Border: t===0?OB:DM, tab1Border: t===1?OB:DM, tab2Border: t===2?OB:DM, tab3Border: t===3?OB:DM,\n      tab0Color: t===0?OB:'#777777', tab1Color: t===1?OB:'#777777', tab2Color: t===2?OB:'#777777', tab3Color: t===3?OB:'#777777',\n      setTab0: () => this.setTab(0), setTab1: () => this.setTab(1), setTab2: () => this.setTab(2), setTab3: () => this.setTab(3),\n      isIdle: s.chatState === 'idle',\n      chatOpen: s.chatState !== 'idle',\n      typingNS: s.typing && !s.isStreaming,\n      isStreaming: s.isStreaming,\n      stream: s.stream,\n      isChatting: s.chatState === 'active',\n      isMapLoading: s.chatState === 'map_loading',\n      showMap: s.chatState === 'map_shown' || s.chatState === 'done',\n      showLeadForm: s.chatState === 'map_shown',\n      isDone: s.chatState === 'done',\n      msgs: s.msgs,\n      inputVal: s.inputVal,\n      inputDisabled: s.inputDisabled,\n      chatRef: this.chatRef,\n      mapSphere: this.MAP.sphere,\n      mapTotal: this.MAP.total,\n      mapLosses: this.MAP.losses,\n      mapAgents: this.MAP.agents,\n      mapRoi: this.MAP.roi,\n      mapDisclaimer: this.MAP.disclaimer,\n      lName: s.lName,\n      lTg: s.lTg,\n      lErr: s.lErr,\n      hasLErr: !!s.lErr,\n      onLName: (e) => this.setState({ lName: e.target.value }),\n      onLTg: (e) => this.setState({ lTg: e.target.value }),\n      submitLead: this.submitLead,\n      startChat: this.startChat,\n      sendMsg: this.sendMsg,\n      handleInput: this.handleInput,\n      handleKey: this.handleKey,\n      faqItems: this.FAQ_ITEMS.map((f, i) => ({\n        ...f,\n        isOpen: s.openFaq === i,\n        icon: s.openFaq === i ? '−' : '+',\n        qColor: s.openFaq === i ? '#FF6A00' : '#F0EEE8',\n        borderColor: s.openFaq === i ? '#FF6A00' : '#1E1E1E',\n        iconColor: s.openFaq === i ? '#FF6A00' : '#505050',\n        toggle: () => this.setState({ openFaq: s.openFaq === i ? -1 : i }),\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
